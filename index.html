<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Savalloys Musical Youth - Active Scope v2</title>
    <style>
        body { margin: 0; background: #020202; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        .scope-frame { position: relative; border: 4px solid #222; border-radius: 15px; background: #050805; box-shadow: 0 0 50px rgba(0,255,65,0.15); }
        canvas { display: block; }
        .overlay-logo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; /* Adjust size as needed */
            opacity: 0.15; /* Makes it a "ghost" background */
            filter: grayscale(1) sepia(1) hue-rotate(100deg) brightness(1.5);
            pointer-events: none;
        }
        .header { position: absolute; top: 15px; width: 100%; text-align: center; color: #00ff41; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body>

    <div class="scope-frame">
        <div class="header">SYSTEM SYNC: NODE 1</div>
        <img src="logo.jpg" class="overlay-logo" alt="Savalloys Logo">
        <canvas id="scope"></canvas>
    </div>

<script>
    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');

    // Set dimensions
    canvas.width = 900;
    canvas.height = 500;

    let offset = 0;
    const amp = 90;
    const freq = 0.015;
    const pcmRes = 18; // The "step" size for the right side

    function drawGrid() {
        ctx.strokeStyle = 'rgba(0, 255, 65, 0.05)';
        ctx.lineWidth = 1;
        for(let x=0; x<canvas.width; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
        for(let y=0; y<canvas.height; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
        
        // Axis lines
        ctx.strokeStyle = 'rgba(0, 255, 65, 0.2)';
        ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
    }

    function render() {
        // Persistence effect (fades old frames)
        ctx.fillStyle = 'rgba(5, 8, 5, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        drawGrid();

        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#00ff41';
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#00ff41';

        const midX = canvas.width / 2;
        const midY = canvas.height / 2;

        for (let x = 0; x < canvas.width; x++) {
            let y;
            if (x < midX) {
                // ANALOGUE SINE
                y = midY + Math.sin(x * freq + offset) * amp;
            } else {
                // PCM QUANTIZED
                let sampledX = Math.floor(x / pcmRes) * pcmRes;
                y = midY + Math.sin(sampledX * freq + offset) * amp;
                y = Math.round(y / 10) * 10; // Digital stepping
            }

            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }

        ctx.stroke();
        offset -= 0.08;
        requestAnimationFrame(render);
    }

    render();
</script>
</body>
</html>
