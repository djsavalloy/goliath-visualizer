<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050510">
<link rel="manifest" href="manifest.json">
<title>DJ Savalloy Audio Grid</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #050510;
    overflow: hidden;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: white;
  }
  canvas { display: block; }

  /* Logo positioning - Centered and lifted */
  .logo-text {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    z-index: 10;
    margin-top: -8vh; 
  }
  .logo-text span {
    display: block;
    text-shadow: 0 0 10px rgba(0,255,255,0.7), 0 0 20px rgba(255,0,150,0.7);
  }
  .logo-top { font-size: 0.7rem; color: #66f7ff; margin-bottom: 0.4rem; }
  .logo-main { font-size: 1.6rem; color: #fff; font-weight: 700; margin-bottom: 0.4rem; }
  .logo-bottom { font-size: 0.9rem; color: #ff5acb; }

  /* Ignition Switch Overlay */
  #start-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 5, 16, 0.98);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.6s ease;
  }
  #start-btn {
    padding: 20px 40px;
    font-size: 1.1rem;
    font-weight: bold;
    color: #00f7ff;
    background: rgba(0, 247, 255, 0.05);
    border: 2px solid #00f7ff;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 3px;
    box-shadow: 0 0 20px rgba(0, 247, 255, 0.3), inset 0 0 15px rgba(0, 247, 255, 0.1);
    transition: all 0.3s ease;
  }
  #start-btn:hover {
    background: #00f7ff;
    color: #050510;
    box-shadow: 0 0 40px rgba(0, 247, 255, 0.6);
  }
</style>
</head>
<body>

<div id="start-overlay">
  <button id="start-btn">Initialize Audio Grid</button>
</div>

<canvas id="scope"></canvas>

<div class="logo-text">
  <span class="logo-top">Original</span>
  <span class="logo-main">DJ Savalloy's</span>
  <span class="logo-bottom">Musical Youth</span>
</div>

<script>
  // PWA Service Worker Registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Fail:', err));
    });
  }

  const canvas = document.getElementById("scope");
  const ctx = canvas.getContext("2d");
  const startOverlay = document.getElementById("start-overlay");
  const startBtn = document.getElementById("start-btn");

  let analyser, timeData, freqData;
  let engineSampleRate = 44100; 

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  async function setupAudio() {
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      engineSampleRate = audioContext.sampleRate; 

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = audioContext.createMediaStreamSource(stream);

      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.85; // Balanced glide
      
      timeData = new Uint8Array(analyser.fftSize);
      freqData = new Uint8Array(analyser.frequencyBinCount);

      source.connect(analyser);
      
      // Clear overlay
      startOverlay.style.opacity = "0";
      setTimeout(() => startOverlay.style.display = "none", 600);

      render();
    } catch (err) {
      console.error("Audio Fault:", err);
      startBtn.innerText = "MIC ACCESS REQUIRED";
      startBtn.style.borderColor = "#ff2fa8";
      startBtn.style.color = "#ff2fa8";
    }
  }

  function drawBackground() {
    const { width, height } = canvas;
    ctx.fillStyle = "#050510";
    ctx.fillRect(0, 0, width, height);
    
    // Grid Infrastructure
    ctx.save();
    ctx.globalAlpha = 0.1;
    ctx.strokeStyle = "#44f";
    const gridSize = 50;
    for (let x = 0; x < width; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
    }
    for (let y = 0; y < height; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
    }
    ctx.restore();
  }

  function drawOscilloscope() {
    const { width, height } = canvas;
    const midY = height / 2.3;
    const scopeWidth = Math.min(width * 0.85, 1200);
    const startX = (width - scopeWidth) / 2;

    function drawWave(color, offset, weight) {
      ctx.beginPath();
      ctx.lineWidth = weight;
      ctx.strokeStyle = color;
      ctx.shadowBlur = 15;
      ctx.shadowColor = color;

      for (let i = 0; i < timeData.length; i++) {
        const x = startX + (i / timeData.length) * scopeWidth;
        const v = timeData[i] / 128.0;
        const y = midY + (v - 1) * (height * 0.15) + offset;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    drawWave("#00f7ff", -height * 0.05, 3); // Cyan Upper
    drawWave("#ff2fa8",  height * 0.05, 3); // Magenta Lower
  }

  function drawCirclePulse() {
    const { width, height } = canvas;
    const cx = width / 2;
    const cy = height / 2.3;
    
    // Calculate Bass Energy
    let bassSum = 0;
    for(let i=0; i<10; i++) bassSum += freqData[i];
    const bass = bassSum / 10 / 255;

    const radius = (Math.min(width, height) * 0.18) * (0.9 + bass * 0.6);

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(cx, cy, radius*0.1, cx, cy, radius);
    grad.addColorStop(0, "rgba(255,255,255,0.4)");
    grad.addColorStop(0.4, "rgba(0,247,255,0.2)");
    grad.addColorStop(1, "rgba(255,47,168,0)");
    ctx.fillStyle = grad;
    ctx.fill();
    
    ctx.strokeStyle = "#00f7ff";
    ctx.lineWidth = 2;
    ctx.shadowBlur = 30 * bass;
    ctx.shadowColor = "#00f7ff";
    ctx.stroke();
    ctx.restore();
  }

  function drawFrequencyTable() {
    const { width, height } = canvas;
    const barCount = 64;
    const tableWidth = Math.min(width * 0.85, 900);
    const startX = (width - tableWidth) / 2;
    const maxBarH = height * 0.18;
    const bottomY = height * 0.88;
    const barW = tableWidth / barCount;

    ctx.save();
    
    // Industrial Housing
    ctx.fillStyle = "rgba(10, 10, 30, 0.8)";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#000";
    ctx.fillRect(startX - 20, bottomY - maxBarH - 20, tableWidth + 40, maxBarH + 60);
    ctx.strokeStyle = "rgba(0, 247, 255, 0.4)";
    ctx.strokeRect(startX - 20, bottomY - maxBarH - 20, tableWidth + 40, maxBarH + 60);

    // Bars
    for (let i = 0; i < barCount; i++) {
      const index = Math.floor((i / barCount) * freqData.length * 0.6); // Focus on audible range
      const v = freqData[index] / 255;
      const h = v * maxBarH;
      const x = startX + i * barW;
      
      const grad = ctx.createLinearGradient(x, bottomY - h, x, bottomY);
      grad.addColorStop(0, "#ff5acb");
      grad.addColorStop(1, "#00f7ff");
      
      ctx.fillStyle = grad;
      ctx.fillRect(x + 2, bottomY - h, barW - 4, h);
    }

    // Telemetry Labels
    ctx.fillStyle = "#66f7ff";
    ctx.font = "bold 10px Monospace";
    ctx.textAlign = "center";
    const labels = 8;
    for (let j = 0; j <= labels; j++) {
      const lx = startX + (j/labels) * tableWidth;
      const freq = Math.floor((j/labels) * (engineSampleRate / 2) * 0.6);
      let txt = freq > 1000 ? (freq/1000).toFixed(1) + "k" : freq + "Hz";
      
      ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.moveTo(lx, bottomY); ctx.lineTo(lx, bottomY + 5); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillText(txt, lx, bottomY + 20);
    }
    ctx.restore();
  }

  function render() {
    requestAnimationFrame(render);
    if (!analyser) return;
    analyser.getByteTimeDomainData(timeData);
    analyser.getByteFrequencyData(freqData);

    drawBackground();
    drawFrequencyTable();
    drawOscilloscope();
    drawCirclePulse();
  }

  startBtn.addEventListener("click", setupAudio);
  drawBackground(); // Initial state
</script>

</body>
</html>
